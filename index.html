<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Academic Performance Analysis System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #eff3f5;
        }

        #header {
            position: absolute;
            top: 48%; /* Adjusted top position to move content up by 2% */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #title {
            font-size: 3em;
            color: #000000;
            margin-bottom: 3cm;
        }

        #buttons {
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            padding: 20px 40px;
            font-size: 24px;
            margin: 0 20px;
            text-decoration: none;
            color: #000000;
            background-color: #5DADE2;
            border: 2px solid #3498db;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
        }
    </style>
</head>

<body>

    <div id="header">
        <div id="title">Academic Performance Analysis System</div>
        <div id="buttons">
            <a href="/stud_login" class="button">Student</a>
            <a href="/teach_login" class="button" >Teacher</a>
        </div>
    </div>

</body>

</html>
